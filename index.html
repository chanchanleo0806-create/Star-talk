<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>StarTalk</title>
    <style>
        :root {
            --kakao-blue: #BACEE0;
            --kakao-yellow: #FEE500;
            --kakao-brown: #3C3E3F;
            --my-bubble: #FEE500;
            --other-bubble: #ffffff;
        }

        body { font-family: 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif; background-color: var(--kakao-blue); margin: 0; padding: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }

        /* 헤더: 카톡 상단바 */
        header { background-color: var(--kakao-blue); padding: 15px; display: flex; justify-content: space-between; align-items: center; font-size: 18px; font-weight: 600; color: #333; position: sticky; top: 0; }

        /* 채팅 영역 */
        #chat-window { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; }
        .date-line { text-align: center; font-size: 12px; color: #556677; background: rgba(0,0,0,0.1); padding: 5px 10px; border-radius: 15px; align-self: center; margin: 20px 0; }

        /* 말풍선 공통 스타일 */
        .msg-container { display: flex; margin-bottom: 15px; max-width: 85%; }
        .profile-img { width: 40px; height: 40px; border-radius: 15px; background: #eee; margin-right: 8px; flex-shrink: 0; overflow: hidden; }
        .profile-img img { width: 100%; height: 100%; object-fit: cover; }
        
        .msg-content { display: flex; flex-direction: column; }
        .user-name { font-size: 12px; color: #333; margin-bottom: 5px; }
        .bubble { padding: 8px 12px; border-radius: 6px; font-size: 14px; line-height: 1.5; position: relative; word-break: break-all; }
        
        /* 상대방 말풍선 */
        .other { align-self: flex-start; }
        .other .bubble { background-color: var(--other-bubble); color: #000; }
        .other .bubble::after { content: ''; position: absolute; left: -6px; top: 10px; border-top: 6px solid transparent; border-bottom: 6px solid transparent; border-right: 8px solid var(--other-bubble); }

        /* 내 말풍선 */
        .me { align-self: flex-end; flex-direction: row-reverse; }
        .me .profile-img { display: none; } /* 내 프사는 보통 안 보임 */
        .me .bubble { background-color: var(--my-bubble); color: #000; border-top-right-radius: 0; }
        .me .bubble::after { content: ''; position: absolute; right: -6px; top: 10px; border-top: 6px solid transparent; border-bottom: 6px solid transparent; border-left: 8px solid var(--my-bubble); }

        /* 이모티콘 전용 말풍선 */
        .emoji-bubble { background: none !important; padding: 0 !important; }
        .emoji-bubble::after { display: none !important; }
        .emoji-bubble img { width: 120px; height: 120px; display: block; }

        /* 하단 입력바 */
        .bottom-bar { background: white; padding: 10px; display: flex; flex-direction: column; }
        .input-row { display: flex; align-items: center; gap: 10px; }
        .icon-btn { font-size: 24px; color: #555; cursor: pointer; background: none; border: none; padding: 0; }
        #msg-input { flex: 1; border: 1px solid #ddd; background: #f9f9f9; padding: 8px 15px; border-radius: 18px; outline: none; }
        .send-btn { background: var(--kakao-yellow); border: none; padding: 7px 15px; border-radius: 5px; font-size: 13px; font-weight: bold; cursor: pointer; }

        /* 이모티콘 창 */
        #emoji-box { display: none; height: 250px; background: #f0f0f0; overflow-y: auto; padding: 10px; }
        .emoji-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
        .emoji-grid img { width: 100%; aspect-ratio: 1; background: white; border-radius: 5px; cursor: pointer; }
    </style>
</head>
<body>

<header>
    <span>←</span>
    <span>돼지 대장님</span>
    <span>🔍 ☰</span>
</header>

<div id="chat-window">
    <div class="date-line">2026년 3월 7일 토요일</div>
    
    <div class="msg-container other">
        <div class="profile-img"><img src="https://cdn-icons-png.flaticon.com/512/2632/2632839.png"></div>
        <div class="msg-content">
            <div class="user-name">돼지 대장님</div>
            <div class="bubble">꿀꿀! 밥 먹었니?</div>
        </div>
    </div>
</div>

<div class="bottom-bar">
    <div class="input-row">
        <button class="icon-btn" onclick="toggleEmojiBox()">😊</button>
        <input type="text" id="msg-input" placeholder="메시지 입력">
        <button class="send-btn" id="send-btn">전송</button>
    </div>
</div>

<div id="emoji-box">
    <div style="margin-bottom: 10px; display: flex; justify-content: space-between;">
        <small>나만의 돼지 이모티콘</small>
        <label for="file-up" style="cursor:pointer; color:blue; font-size:12px;">+ 추가</label>
        <input type="file" id="file-up" style="display:none" onchange="uploadEmoji(event)">
    </div>
    <div class="emoji-grid" id="emoji-grid-list">
        <img src="https://cdn-icons-png.flaticon.com/512/1998/1998662.png" onclick="sendEmoji(this.src)">
    </div>
</div>

<script type="module">
    // Firebase 설정 (제공해주신 코드 적용)
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getDatabase, ref, push, onChildAdded } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";
    
    const firebaseConfig = {
        apiKey: "AIzaSyDEl6KxUHz2EohE3UA6PBu9Lz708AHZAI8",
        authDomain: "star2-4641a.firebaseapp.com",
        databaseURL: "https://star2-4641a-default-rtdb.firebaseio.com",
        projectId: "star2-4641a",
        storageBucket: "star2-4641a.firebasestorage.app",
        messagingSenderId: "388844449252",
        appId: "1:388844449252:web:467421ef449f56b003abf1"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const chatWindow = document.getElementById('chat-window');

    // 메시지 전송 (텍스트)
    document.getElementById('send-btn').onclick = () => {
        const input = document.getElementById('msg-input');
        if(!input.value.trim()) return;
        push(ref(db, 'chat'), { sender: 'me', type: 'text', content: input.value });
        input.value = '';
    };

    // 메시지 전송 (이모티콘)
    window.sendEmoji = (src) => {
        push(ref(db, 'chat'), { sender: 'me', type: 'emoji', content: src });
        document.getElementById('emoji-box').style.display = 'none';
    };

    // 실시간 메시지 수신
    onChildAdded(ref(db, 'chat'), (snap) => {
        const data = snap.val();
        const isMe = data.sender === 'me';
        
        const container = document.createElement('div');
        container.className = `msg-container ${isMe ? 'me' : 'other'}`;
        
        let bubbleContent = data.type === 'emoji' 
            ? `<div class="bubble emoji-bubble"><img src="${data.content}"></div>`
            : `<div class="bubble">${data.content}</div>`;

        container.innerHTML = `
            <div class="profile-img"><img src="https://cdn-icons-png.flaticon.com/512/2632/2632839.png"></div>
            <div class="msg-content">
                ${isMe ? '' : `<div class="user-name">돼지 대장님</div>`}
                ${bubbleContent}
            </div>
        `;
        
        chatWindow.appendChild(container);
        chatWindow.scrollTop = chatWindow.scrollHeight;
    });

    window.toggleEmojiBox = () => {
        const box = document.getElementById('emoji-box');
        box.style.display = box.style.display === 'block' ? 'none' : 'block';
    };
</script>
</body>
</html>
