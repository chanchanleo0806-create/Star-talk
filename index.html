<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Black Messenger</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #000; --text: #fff; --gray: #222; --accent: #444; }
        * { box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background: var(--bg); color: var(--text); margin: 0; overflow: hidden; }
        .hidden { display: none !important; }

        /* 로그인 화면 */
        #login-screen { height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .logo { font-size: 2rem; font-weight: 700; letter-spacing: -1px; margin-bottom: 30px; }
        input { background: var(--gray); border: 1px solid var(--accent); color: white; padding: 15px; border-radius: 8px; width: 280px; margin-bottom: 10px; }
        button { background: var(--text); border: none; padding: 15px; border-radius: 8px; width: 280px; font-weight: 700; cursor: pointer; transition: 0.2s; }
        button:hover { background: #ccc; }

        /* 메인 채팅 화면 */
        #chat-screen { height: 100vh; display: flex; flex-direction: column; }
        header { padding: 20px; border-bottom: 1px solid var(--gray); display: flex; justify-content: space-between; align-items: center; }
        #messages { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 10px; }
        
        /* 말풍선 */
        .bubble { max-width: 75%; padding: 12px 16px; border-radius: 18px; font-size: 14px; line-height: 1.4; }
        .mine { align-self: flex-end; background: var(--text); color: var(--bg); border-bottom-right-radius: 2px; }
        .other { align-self: flex-start; background: var(--gray); border-bottom-left-radius: 2px; }

        /* 하단 입력바 */
        .input-bar { padding: 20px; background: var(--bg); border-top: 1px solid var(--gray); display: flex; gap: 10px; }
        .input-bar input { flex: 1; margin: 0; }
        .input-bar button { width: 70px; }

        /* 전화 오버레이 */
        #call-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); display: none; flex-direction: column; align-items: center; justify-content: space-around; z-index: 1000; }
        .video-container { display: flex; gap: 10px; }
        .video-placeholder { width: 140px; height: 200px; background: var(--gray); border: 1px solid var(--accent); display: flex; align-items: center; justify-content: center; font-size: 12px; }
        .end-call-btn { background: #ff3b30; color: white; width: 60px; height: 60px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 20px; }

        /* 알림 애니메이션 */
        @keyframes slideDown { from { transform: translate(-50%, -100%); } to { transform: translate(-50%, 20px); } }
        .noti-bar { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); background: white; color: black; padding: 12px 24px; border-radius: 50px; font-size: 14px; font-weight: bold; animation: slideDown 0.4s ease-out; z-index: 2000; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
    </style>
</head>
<body>

    <div id="login-screen">
        <div class="logo">BLACK TALK</div>
        <input type="email" id="email-input" placeholder="이메일 입력 (@ 제외 아이디만 입력 가능)">
        <button onclick="login()">시작하기</button>
    </div>

    <div id="chat-screen" class="hidden">
        <header>
            <div style="font-weight: 700;">Global Room</div>
            <div style="display: flex; gap: 15px;">
                <span onclick="startCall('voice')" style="cursor:pointer">📞</span>
                <span onclick="startCall('video')" style="cursor:pointer">📹</span>
            </div>
        </header>
        <div id="messages"></div>
        <div class="input-bar">
            <input type="text" id="msg-input" placeholder="메시지를 입력하세요..." onkeypress="if(event.keyCode==13) sendMsg()">
            <button onclick="sendMsg()">전송</button>
        </div>
    </div>

    <div id="call-overlay">
        <div id="call-status" style="font-size: 1.2rem;">연결 중...</div>
        <div id="video-area" class="video-container hidden">
            <div class="video-placeholder">나</div>
            <div class="video-placeholder">상대방</div>
        </div>
        <div class="end-call-btn" onclick="endCall()">✕</div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, push, onChildAdded } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        // Firebase 설정
        const firebaseConfig = {
            apiKey: "AIzaSyCPqbKwoAzmi2P_RsIIpV01NKZecoEHPXc",
            authDomain: "starchet-e9630.firebaseapp.com",
            databaseURL: "https://starchet-e9630-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "starchet-e9630",
            storageBucket: "starchet-e9630.firebasestorage.app",
            messagingSenderId: "532571302538",
            appId: "1:532571302538:web:788d6bbb75de261502db73"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        let currentUser = "";

        // 1. 로그인
        window.login = () => {
            const input = document.getElementById('email-input').value;
            if(!input) return alert("아이디를 입력하세요!");
            currentUser = input;
            document.getElementById('login-screen').classList.add('hidden');
            document.getElementById('chat-screen').classList.remove('hidden');
            
            // 알림 권한 요청
            if (Notification.permission !== 'granted') Notification.requestPermission();
            
            initChat();
        };

        // 2. 채팅 초기화
        function initChat() {
            onChildAdded(ref(db, 'chats'), (data) => {
                const msg = data.val();
                const isMine = msg.user === currentUser;
                renderMsg(msg.user, msg.text, isMine);
                
                if (!isMine) {
                    showNotification(msg.user, msg.text);
                }
            });
        }

        // 3. 메시지 전송
        window.sendMsg = () => {
            const input = document.getElementById('msg-input');
            if(!input.value) return;
            push(ref(db, 'chats'), {
                user: currentUser,
                text: input.value,
                timestamp: Date.now()
            });
            input.value = "";
        };

        function renderMsg(user, text, isMine) {
            const container = document.getElementById('messages');
            const div = document.createElement('div');
            div.className = `bubble ${isMine ? 'mine' : 'other'}`;
            div.innerHTML = isMine ? text : `<small style="display:block; color:#888; margin-bottom:4px;">${user}</small>${text}`;
            container.appendChild(div);
            container.scrollTop = container.scrollHeight;
        }

        // 4. 알림 시스템
        function showNotification(user, text) {
            // 시스템 알림
            if (Notification.permission === 'granted') {
                new Notification(`Black Talk: ${user}`, { body: text });
            }
            // 인앱 알림 바
            const bar = document.createElement('div');
            bar.className = 'noti-bar';
            bar.innerText = `${user}: ${text}`;
            document.body.appendChild(bar);
            setTimeout(() => bar.remove(), 3000);
        }

        // 5. 통화 기능 연출
        window.startCall = (type) => {
            const overlay = document.getElementById('call-overlay');
            overlay.style.display = 'flex';
            document.getElementById('call-status').innerText = type === 'video' ? '영상 통화 연결 중...' : '음성 통화 연결 중...';
            if(type === 'video') document.getElementById('video-area').classList.remove('hidden');
        };

        window.endCall = () => {
            document.getElementById('call-overlay').style.display = 'none';
            document.getElementById('video-area').classList.add('hidden');
        };
    </script>
</body>
</html>
