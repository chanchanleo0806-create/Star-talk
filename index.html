<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>StarChat Noir</title>
    <style>
        /* ⚙️ 마스터 설정 (스크립트에서 수정 가능) */
        /* ID: master77 / PW: 7777 */

        :root { --bg: #ffffff; --text: #000000; --gray: #f2f2f2; --border: #eeeeee; }
        * { box-sizing: border-box; font-family: 'Pretendard', -apple-system, sans-serif; letter-spacing: -0.03em; }
        body, html { margin: 0; padding: 0; height: 100vh; background: #fff; overflow: hidden; }

        #app { display: flex; flex-direction: column; height: 100%; max-width: 450px; margin: 0 auto; position: relative; }

        /* 📱 카톡 스타일 헤더 */
        .main-header { padding: 50px 20px 15px; display: flex; justify-content: space-between; align-items: center; }
        .main-header h1 { font-size: 1.5rem; font-weight: 800; margin: 0; }
        .header-icons { display: flex; gap: 18px; font-size: 1.2rem; cursor: pointer; }

        /* 📋 뷰 섹션 */
        .view { display: none; height: calc(100% - 145px); overflow-y: auto; }
        .view.active { display: block; }

        /* 👤 친구 리스트 (카톡 UI와 동일) */
        .profile-item { display: flex; align-items: center; padding: 12px 20px; cursor: pointer; transition: 0.2s; }
        .profile-item:active { background: #f9f9f9; }
        .p-img-kakao { width: 52px; height: 52px; border-radius: 20px; background: #000; margin-right: 15px; display: flex; align-items: center; justify-content: center; color: #fff; font-weight: 800; font-size: 1.1rem; overflow: hidden; background-size: cover; }
        .p-info { flex: 1; }
        .p-name { font-size: 0.95rem; font-weight: 600; margin-bottom: 4px; }
        .p-status { font-size: 0.75rem; color: #999; }

        /* 💬 채팅방 (카톡 말풍선 최적화) */
        #chat-window { position: fixed; inset: 0; background: #fff; z-index: 5000; display: none; flex-direction: column; }
        .chat-header { padding: 45px 15px 15px; border-bottom: 1px solid #f2f2f2; display: flex; align-items: center; }
        .chat-body { flex: 1; background: #fff; padding: 15px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; }
        
        .bubble-wrap { display: flex; flex-direction: column; max-width: 85%; }
        .bubble { padding: 9px 12px; border-radius: 14px; font-size: 0.9rem; line-height: 1.4; position: relative; }
        .bubble-left { align-self: flex-start; background: var(--gray); border-top-left-radius: 2px; }
        .bubble-right { align-self: flex-end; background: #000; color: #fff; border-top-right-radius: 2px; }
        
        /* 🖼️ 이미지 미리보기 & 업로드 */
        #preview-area { display: none; padding: 10px 15px; background: #fcfcfc; border-top: 1px solid #eee; }
        #preview-img { width: 60px; height: 60px; border-radius: 8px; object-fit: cover; }

        .chat-input-bar { padding: 10px 15px 30px; border-top: 1px solid #f2f2f2; display: flex; align-items: center; gap: 12px; }
        .chat-input { flex: 1; border: none; background: #f4f4f4; padding: 10px 15px; border-radius: 18px; outline: none; font-size: 0.9rem; }

        /* 📞 통화/영상통화 (보이스톡/페이스톡 UI) */
        #call-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.92); z-index: 6000; display: none; flex-direction: column; align-items: center; justify-content: space-between; padding: 100px 0; color: #fff; }
        .call-btns { display: flex; gap: 40px; margin-bottom: 20px; }
        .call-circle { width: 65px; height: 65px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 1.5rem; cursor: pointer; }

        /* 🧭 하단 네비게이션 */
        .bottom-nav { height: 75px; border-top: 1px solid #f2f2f2; display: flex; background: #fff; padding-bottom: 15px; }
        .nav-tab { flex: 1; display: flex; align-items: center; justify-content: center; color: #ccc; cursor: pointer; }
        .nav-tab.active { color: #000; }
    </style>
</head>
<body>

<div id="app">
    <div class="main-header">
        <h1 id="v-title">친구</h1>
        <div class="header-icons">🔍 👤+ ⚙️</div>
    </div>

    <div id="v-friends" class="view active">
        <div class="profile-item" onclick="openProfile('마스터', 'master77')">
            <div class="p-img-kakao" id="my-p-img">M</div>
            <div class="p-info">
                <div class="p-name">마스터 (나)</div>
                <div class="p-status">상태 메시지를 입력하세요.</div>
            </div>
        </div>
        <div style="height: 1px; background: #f2f2f2; margin: 10px 20px;"></div>
        <div id="friend-list">
            </div>
    </div>

    <div id="v-chats" class="view">
        <div class="profile-item" onclick="openChat('단체 채팅방', true)">
            <div class="p-img-kakao">그룹</div>
            <div class="p-info">
                <div class="p-name">동기회 단톡방</div>
                <div class="p-status">사진을 보냈습니다.</div>
            </div>
            <div style="font-size: 0.65rem; color: #ccc;">오후 3:12</div>
        </div>
    </div>

    <div id="chat-window">
        <div class="chat-header">
            <span onclick="closeChat()" style="margin-right:15px; cursor:pointer; font-size:1.4rem;">←</span>
            <b id="chat-user-name" style="flex:1;">이름</b>
            <div style="display:flex; gap:18px; font-size:1.2rem;">
                <span onclick="makeCall('video')">📹</span>
                <span onclick="makeCall('audio')">📞</span>
                <span>≡</span>
            </div>
        </div>
        <div class="chat-body" id="chat-body">
            </div>
        <div id="preview-area">
            <img id="preview-img" src="">
            <span onclick="cancelUpload()" style="margin-left:10px; cursor:pointer;">✕</span>
        </div>
        <div class="chat-input-bar">
            <label style="cursor:pointer; font-size:1.4rem;">+<input type="file" style="display:none;" onchange="previewFile(this)"></label>
            <input type="text" id="chat-input" class="chat-input" placeholder="메시지 입력">
            <span onclick="sendMsg()" style="font-weight:bold; cursor:pointer;">전송</span>
        </div>
    </div>

    <div id="call-overlay">
        <div style="text-align:center;">
            <div style="width:110px; height:110px; background:#222; border-radius:40px; margin:0 auto 25px;"></div>
            <h2 id="call-target">사용자</h2>
            <p id="call-type" style="color:#666; font-size:0.9rem;">연결 중...</p>
        </div>
        <div class="call-btns">
            <div class="call-circle" style="background:#ff3b30;" onclick="endCall()">✕</div>
            <div class="call-circle" style="background:#34c759;">📞</div>
        </div>
    </div>

    <div class="bottom-nav">
        <div class="nav-tab active" onclick="tab('friends', this, '친구')">👤</div>
        <div class="nav-tab" onclick="tab('chats', this, '채팅')">💬</div>
        <div class="nav-tab" onclick="location.reload()">···</div>
    </div>
</div>

<script>
    // 🗝️ 마스터 설정 (비밀번호: 7777)
    const MASTER_PW = "7777";
    let myName = "마스터";

    function tab(id, el, title) {
        document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
        document.querySelectorAll('.nav-tab').forEach(n => n.classList.remove('active'));
        document.getElementById('v-' + id).classList.add('active');
        el.classList.add('active');
        document.getElementById('v-title').innerText = title;
    }

    function openChat(name, isGroup = false) {
        document.getElementById('chat-window').style.display = 'flex';
        document.getElementById('chat-user-name').innerText = name;
    }

    function closeChat() { document.getElementById('chat-window').style.display = 'none'; }

    function previewFile(input) {
        if (input.files && input.files[0]) {
            const reader = new FileReader();
            reader.onload = (e) => {
                document.getElementById('preview-img').src = e.target.result;
                document.getElementById('preview-area').style.display = 'block';
            };
            reader.readAsDataURL(input.files[0]);
        }
    }

    function cancelUpload() { document.getElementById('preview-area').style.display = 'none'; }

    function sendMsg() {
        const val = document.getElementById('chat-input').value;
        if(!val && document.getElementById('preview-area').style.display === 'none') return;
        
        const body = document.getElementById('chat-body');
        const bubble = document.createElement('div');
        bubble.className = "bubble bubble-right";
        bubble.innerText = val;
        
        if(document.getElementById('preview-area').style.display === 'block') {
            const img = document.createElement('img');
            img.src = document.getElementById('preview-img').src;
            img.style = "max-width:100%; border-radius:10px; margin-top:5px;";
            bubble.appendChild(img);
        }

        body.appendChild(bubble);
        body.scrollTop = body.scrollHeight;
        document.getElementById('chat-input').value = "";
        cancelUpload();
    }

    function makeCall(type) {
        document.getElementById('call-overlay').style.display = 'flex';
        document.getElementById('call-target').innerText = document.getElementById('chat-user-name').innerText;
        document.getElementById('call-type').innerText = type === 'video' ? '페이스톡 연결 중' : '보이스톡 연결 중';
    }

    function endCall() { document.getElementById('call-overlay').style.display = 'none'; }

    // 샘플 데이터
    const fData = [{n:"친구 A", s:"오늘 하루도 화이팅"}, {n:"친구 B", s:"휴가 중입니다"}];
    document.getElementById('friend-list').innerHTML = fData.map(f => `
        <div class="profile-item" onclick="openChat('${f.n}')">
            <div class="p-img-kakao">${f.n[0]}</div>
            <div class="p-info">
                <div class="p-name">${f.n}</div>
                <div class="p-status">${f.s}</div>
            </div>
        </div>
    `).join('');
</script>
</body>
</html>
