<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>스타챗 (StarChat)</title>
    
    <style>
        :root { --main: #ffca28; --bg: #ffffff; --text: #000000; --gray: #f2f2f2; --edge: #00f2fe; --card: #1e1e1e; }
        body, html { margin: 0; padding: 0; background: var(--bg); color: var(--text); font-family: -apple-system, sans-serif; height: 100%; overflow: hidden; }
        #app { display: flex; flex-direction: column; height: 100vh; max-width: 500px; margin: 0 auto; position: relative; }

        /* ✨ 엣지 라이팅 (게임 승리/알림 효과) */
        .edge-glow { border: 4px solid var(--edge) !important; box-shadow: inset 0 0 20px var(--edge) !important; }

        .header { padding: 15px; display: flex; justify-content: space-between; align-items: center; font-size: 1.2rem; font-weight: bold; border-bottom: 1px solid var(--gray); background: white; z-index: 10; }
        .content { flex: 1; overflow-y: auto; background: white; }
        .view { display: none; height: 100%; }
        .view.active { display: block; }

        /* 👤 카톡형 프로필 & 친구 목록 */
        .profile-row { display: flex; align-items: center; padding: 15px; cursor: pointer; border-bottom: 1px solid #f9f9f9; }
        .avatar { width: 50px; height: 50px; border-radius: 18px; background: #eee; margin-right: 15px; display: flex; align-items: center; justify-content: center; font-size: 1.8rem; border: 1px solid #ddd; }

        /* 🎮 게임 센터 (핵심!) */
        .game-header { background: var(--card); color: white; padding: 20px; border-radius: 20px; margin: 15px; text-align: center; }
        .game-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; padding: 15px; }
        .game-card { background: var(--gray); padding: 20px; border-radius: 15px; text-align: center; cursor: pointer; border: 2px solid transparent; transition: 0.2s; }
        .game-card:active { border-color: var(--main); background: #e0e0e0; }
        .game-card span { display: block; font-size: 2.5rem; margin-bottom: 10px; }

        /* 🃏 실제 게임 화면 (우노/대결 모드) */
        #game-play { position: fixed; inset: 0; background: #0b3d0b; z-index: 3000; display: none; flex-direction: column; color: white; padding: 20px; }
        .card-area { flex: 1; display: flex; flex-direction: column; justify-content: space-around; align-items: center; }
        .opp-card { width: 60px; height: 90px; background: #c0392b; border: 2px solid white; border-radius: 5px; margin: 5px; }
        .my-hand { display: flex; gap: 10px; overflow-x: auto; padding: 10px; width: 100%; }
        .uno-card { width: 70px; height: 110px; border-radius: 8px; border: 2px solid white; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 1.5rem; flex-shrink: 0; cursor: pointer; }

        /* 🎭 캐릭터 꾸미기 (프로필 내 진입) */
        #profile-detail { position: fixed; inset: 0; background: rgba(0,0,0,0.9); color: white; z-index: 2000; display: none; flex-direction: column; align-items: center; justify-content: center; }
        .deco-item { width: 55px; height: 55px; background: #333; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 1.8rem; cursor: pointer; border: 2px solid transparent; }
        .deco-item.selected { border-color: var(--main); }

        /* 📱 하단 네비 */
        .nav { height: 60px; display: flex; border-top: 1px solid var(--gray); background: #f9f9f9; }
        .nav-tab { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 0.7rem; color: #666; }
        .nav-tab.active { color: #000; font-weight: bold; }
    </style>
</head>
<body id="main-body">

<div id="app">
    <div class="header">
        <span id="title">스타챗</span>
        <div style="font-size:1.3rem;">🔍 🔔 ⚙️</div>
    </div>

    <div class="content">
        <div id="tab-friends" class="view active">
            <div class="profile-row" onclick="toggleProfile()">
                <div class="avatar" id="my-ava">🤴</div>
                <div class="profile-info"><b>마스터 (나)</b><p>캐릭터 꾸미기 터치</p></div>
            </div>
            <div style="padding:15px; font-size:0.8rem; color:#888;">친구 목록</div>
            <div class="profile-row">
                <div class="avatar">🤖</div><div><b>AI 봇</b><p>우노 한판 어때요?</p></div>
            </div>
        </div>

        <div id="tab-game" class="view">
            <div class="game-header">
                <h2 style="margin:0;">Star Tournament</h2>
                <p style="font-size:0.8rem; color:var(--main);">매주 토요일 랜덤 매칭 대회</p>
            </div>
            <div class="game-grid">
                <div class="game-card" onclick="openGame('🃏 우노')"><span>🃏</span>우노 매칭</div>
                <div class="game-card" onclick="openGame('♟️ 체스')"><span>♟️</span>체스 매칭</div>
                <div class="game-card" onclick="openGame('🎮 랜덤')"><span>⚔️</span>랜덤 PvP</div>
                <div class="game-card" onclick="alert('친구 초대 중...')"><span>👥</span>친구와 대결</div>
            </div>
            <div style="padding:15px;">
                <h4 style="margin-bottom:10px;">🎥 1개월 다시보기</h4>
                <div style="background:#f2f2f2; padding:10px; border-radius:10px; font-size:0.8rem;">
                    [우노] 마스터 vs 유저_K (승리) <button style="float:right;">보기</button>
                </div>
            </div>
        </div>
    </div>

    <div id="profile-detail">
        <span onclick="toggleProfile()" style="position:absolute; top:20px; right:25px; font-size:2rem;">×</span>
        <div id="preview-ava" style="font-size:5rem; margin-bottom:30px; background:white; width:120px; height:120px; border-radius:40px; display:flex; align-items:center; justify-content:center;">🤴</div>
        <div style="display:grid; grid-template-columns:repeat(4,1fr); gap:10px; margin-bottom:40px;">
            <div class="deco-item" onclick="changeAva('🤴')">🤴</div>
            <div class="deco-item" onclick="changeAva('🥷')">🥷</div>
            <div class="deco-item" onclick="changeAva('🧙')">🧙</div>
            <div class="deco-item" onclick="changeAva('🦁')">🦁</div>
            <div class="deco-item" onclick="changeAva('🦊')">🦊</div>
            <div class="deco-item" onclick="changeAva('🤖')">🤖</div>
            <div class="deco-item" onclick="changeAva('🧑‍🚀')">🧑‍🚀</div>
            <div class="deco-item" onclick="changeAva('🤡')">🤡</div>
        </div>
        <div style="display:flex; gap:40px;">
            <div onclick="alert('다자간 전화')">📞</div><div onclick="alert('그룹 영통')">📹</div><div onclick="alert('채팅')">💬</div>
        </div>
    </div>

    <div id="game-play">
        <div style="display:flex; justify-content:space-between; align-items:center;">
            <span id="game-title">🃏 우노 토너먼트</span>
            <button onclick="closeGame()" style="background:none; border:none; color:white; font-size:1.5rem;">×</button>
        </div>
        <div class="card-area">
            <div style="text-align:center;"><div class="opp-card"></div>상대방 카드 (7장)</div>
            <div style="width:120px; height:120px; border:4px solid var(--main); border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:2rem; background:#222;">
                8 <span style="color:red; margin-left:5px;">❤️</span>
            </div>
            <div style="text-align:center;">내 카드 (남은 시간: 12초)</div>
        </div>
        <div class="my-hand">
            <div class="uno-card" style="background:#e74c3c;" onclick="useCard()">3</div>
            <div class="uno-card" style="background:#3498db;" onclick="useCard()">반사</div>
            <div class="uno-card" style="background:#f1c40f; color:black;" onclick="useCard()">+4</div>
            <div class="uno-card" style="background:#2ecc71;" onclick="useCard()">7</div>
        </div>
    </div>

    <div class="nav">
        <div class="nav-tab active" onclick="showTab('friends')">👤 친구</div>
        <div class="nav-tab" onclick="showTab('game')">🎮 게임</div>
        <div class="nav-tab" onclick="alert('알림')">🔔 알림</div>
        <div class="nav-tab" onclick="showTab('game')">🎥 VOD</div>
    </div>
</div>

<script>
    function showTab(id) {
        document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
        document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
        document.getElementById('tab-' + id).classList.add('active');
        event.currentTarget.classList.add('active');
    }

    function toggleProfile() {
        const p = document.getElementById('profile-detail');
        p.style.display = (p.style.display === 'flex') ? 'none' : 'flex';
    }

    function changeAva(emoji) {
        document.getElementById('preview-ava').innerText = emoji;
        document.getElementById('my-ava').innerText = emoji;
        const b = document.getElementById('main-body');
        b.classList.add('edge-glow');
        setTimeout(() => b.classList.remove('edge-glow'), 1000);
    }

    function openGame(title) {
        document.getElementById('game-title').innerText = title;
        document.getElementById('game-play').style.display = 'flex';
    }

    function closeGame() {
        document.getElementById('game-play').style.display = 'none';
    }

    function useCard() {
        alert("카드를 냈습니다! (상대방 턴 대기 중...)");
        const b = document.getElementById('main-body');
        b.classList.add('edge-glow');
        setTimeout(() => b.classList.remove('edge-glow'), 800);
    }
</script>
</body>
</html>
