<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Black Talk - Google Auth</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #000; --text: #fff; --gray: #121212; --point: #222; --accent: #ffffff; --danger: #ff3b30; }
        * { box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background: var(--bg); color: var(--text); margin: 0; overflow: hidden; height: 100vh; }
        .hidden { display: none !important; }

        /* --- UI Components --- */
        .screen { height: 100vh; display: flex; flex-direction: column; }
        #auth-page { align-items: center; justify-content: center; padding: 40px; }
        input { background: var(--gray); border: 1px solid var(--point); color: white; padding: 14px; border-radius: 12px; width: 100%; margin-bottom: 10px; outline: none; }
        .btn { background: var(--accent); color: var(--bg); border: none; padding: 14px; border-radius: 12px; font-weight: 700; cursor: pointer; width: 100%; margin-top: 5px; }
        .btn-google { background: #fff; color: #000; display: flex; align-items: center; justify-content: center; gap: 10px; margin-top: 10px; }
        
        header { padding: 15px 20px; border-bottom: 1px solid var(--point); display: flex; justify-content: space-between; align-items: center; }
        #messages { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 12px; }
        .bubble { max-width: 75%; padding: 12px 16px; border-radius: 18px; font-size: 14px; line-height: 1.5; }
        .mine { align-self: flex-end; background: var(--accent); color: var(--bg); border-bottom-right-radius: 2px; }
        .other { align-self: flex-start; background: var(--gray); border-bottom-left-radius: 2px; }
        
        .input-bar { padding: 20px; display: flex; gap: 10px; border-top: 1px solid var(--point); }
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 1000; display: flex; flex-direction: column; padding: 30px; align-items: center; }
    </style>
</head>
<body>

    <div id="auth-page" class="screen">
        <h1 style="font-size: 3rem; letter-spacing: -3px; margin-bottom: 30px;">BLACK</h1>
        <div style="width: 100%; max-width: 320px;">
            <input type="text" id="username" placeholder="아이디">
            <input type="password" id="password" placeholder="비밀번호">
            <button class="btn" onclick="handleAuth()" id="auth-btn">로그인</button>
            
            <button class="btn btn-google" onclick="loginWithGoogle()">
                <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/action/google.svg" width="18"> Google로 시작하기
            </button>
            
            <p onclick="toggleAuth()" style="text-align:center; font-size:12px; color:#666; cursor:pointer; margin-top:20px;" id="auth-toggle">계정이 없으신가요? 회원가입</p>
        </div>
    </div>

    <div id="chat-page" class="screen hidden">
        <header>
            <div style="display:flex; align-items:center; gap:10px;" onclick="openProfile()">
                <img id="my-pfp" src="" style="width:32px; height:32px; border-radius:50%; background:#333; object-fit: cover;">
                <span id="my-name" style="font-weight:700;">Loading...</span>
            </div>
            <div style="display:flex; gap:15px;">
                <span id="admin-tag" class="hidden" onclick="openAdmin()" style="color:red; font-weight:800; cursor:pointer; border:1px solid red; padding:2px 5px; font-size:10px;">ADMIN</span>
                <span onclick="startCall('video')" style="cursor:pointer">📹</span>
            </div>
        </header>
        <div id="messages"></div>
        <div class="input-bar">
            <input type="text" id="chat-input" placeholder="메시지 입력..." onkeypress="if(event.keyCode==13) sendMsg()">
            <button class="btn" style="width:60px; margin:0;" onclick="sendMsg()">↑</button>
        </div>
    </div>

    <div id="profile-modal" class="modal hidden">
        <h2>프로필 수정</h2>
        <img id="edit-pfp-preview" style="width:100px; height:100px; border-radius:50%; margin:20px; object-fit: cover;">
        <input type="file" id="pfp-file" class="hidden" onchange="previewImg(this)">
        <button class="btn" style="width:120px; font-size:12px;" onclick="document.getElementById('pfp-file').click()">사진 선택</button>
        <input type="text" id="edit-nickname" placeholder="닉네임" style="margin-top:20px; max-width:250px;">
        <div style="display:flex; gap:10px; margin-top:30px; width:100%; max-width:250px;">
            <button class="btn" onclick="saveProfile()">저장</button>
            <button class="btn" style="background:#333; color:white;" onclick="closeProfile()">닫기</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, GoogleAuthProvider, signInWithPopup, createUserWithEmailAndPassword, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getDatabase, ref, push, onChildAdded, update, get } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";
        import { getStorage, ref as sRef, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-storage.js";

        // Firebase 설정 (본인의 정보로 유지)
        const firebaseConfig = {
            apiKey: "AIzaSyCPqbKwoAzmi2P_RsIIpV01NKZecoEHPXc",
            authDomain: "starchet-e9630.firebaseapp.com",
            databaseURL: "https://starchet-e9630-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "starchet-e9630",
            storageBucket: "starchet-e9630.firebasestorage.app",
            messagingSenderId: "532571302538",
            appId: "1:532571302538:web:788d6bbb75de261502db73"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getDatabase(app);
        const storage = getStorage(app);
        const provider = new GoogleAuthProvider();

        let isSignUp = false;
        let myInfo = { name: "", pfp: "" };
        const ADMIN_EMAIL = "admin@test.com"; // 구글 계정 이메일이 이거면 어드민

        /* --- 구글 로그인 --- */
        window.loginWithGoogle = async () => {
            try {
                const result = await signInWithPopup(auth, provider);
                const user = result.user;
                // 구글 정보를 DB에 동기화
                await update(ref(db, `users/${user.uid}`), {
                    name: user.displayName,
                    pfp: user.photoURL,
                    isBanned: false
                });
            } catch(e) { alert("구글 로그인 실패: " + e.message); }
        };

        /* --- 아이디 로그인 --- */
        window.handleAuth = async () => {
            const id = document.getElementById('username').value;
            const pw = document.getElementById('password').value;
            const email = id + "@blacktalk.com";
            try {
                if(isSignUp) {
                    await createUserWithEmailAndPassword(auth, email, pw);
                    await update(ref(db, `users/${auth.currentUser.uid}`), { name: id, pfp: "https://via.placeholder.com/150", isBanned: false });
                } else {
                    await signInWithEmailAndPassword(auth, email, pw);
                }
            } catch(e) { alert(e.message); }
        };

        window.toggleAuth = () => {
            isSignUp = !isSignUp;
            document.getElementById('auth-btn').innerText = isSignUp ? "가입하기" : "로그인";
            document.getElementById('auth-toggle').innerText = isSignUp ? "이미 계정이 있나요? 로그인" : "계정이 없으신가요? 회원가입";
        };

        /* --- 상태 감시 및 채팅 --- */
        onAuthStateChanged(auth, async (user) => {
            if(user) {
                const snap = await get(ref(db, `users/${user.uid}`));
                const data = snap.val();
                if(data?.isBanned) { alert("차단됨"); signOut(auth); return; }

                myInfo = data || { name: user.email.split('@')[0], pfp: "https://via.placeholder.com/150" };
                if(user.email === ADMIN_EMAIL) document.getElementById('admin-tag').classList.remove('hidden');
                
                document.getElementById('my-name').innerText = myInfo.name;
                document.getElementById('my-pfp').src = myInfo.pfp;
                document.getElementById('auth-page').classList.add('hidden');
                document.getElementById('chat-page').classList.remove('hidden');
                initChat();
            }
        });

        function initChat() {
            onChildAdded(ref(db, 'global_msgs'), (data) => {
                const m = data.val();
                const isMine = m.uid === auth.currentUser.uid;
                const div = document.createElement('div');
                div.className = `bubble ${isMine ? 'mine' : 'other'}`;
                div.innerHTML = `<small style="display:block; font-size:10px; opacity:0.5;">${isMine ? '' : m.userName}</small>${m.text}`;
                document.getElementById('messages').appendChild(div);
                document.getElementById('messages').scrollTop = document.getElementById('messages').scrollHeight;
            });
        }

        window.sendMsg = () => {
            const input = document.getElementById('chat-input');
            if(!input.value) return;
            push(ref(db, 'global_msgs'), { uid: auth.currentUser.uid, userName: myInfo.name, text: input.value });
            input.value = "";
        };

        /* --- 프로필 수정 --- */
        window.openProfile = () => {
            document.getElementById('edit-nickname').value = myInfo.name;
            document.getElementById('edit-pfp-preview').src = myInfo.pfp;
            document.getElementById('profile-modal').classList.remove('hidden');
        };
        window.closeProfile = () => document.getElementById('profile-modal').classList.add('hidden');
        window.previewImg = (input) => {
            if(input.files[0]) {
                const reader = new FileReader();
                reader.onload = (e) => document.getElementById('edit-pfp-preview').src = e.target.result;
                reader.readAsDataURL(input.files[0]);
            }
        };
        window.saveProfile = async () => {
            const user = auth.currentUser;
            const file = document.getElementById('pfp-file').files[0];
            let url = myInfo.pfp;
            if(file) {
                const sr = sRef(storage, `pfp/${user.uid}`);
                await uploadBytes(sr, file);
                url = await getDownloadURL(sr);
            }
            await update(ref(db, `users/${user.uid}`), { name: document.getElementById('edit-nickname').value, pfp: url });
            location.reload();
        };
    </script>
</body>
</html>
