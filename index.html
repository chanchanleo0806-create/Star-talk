<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StarTalk Login</title>
    <style>
        body { background: #FEE500; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; font-family: sans-serif; }
        .login-card { background: white; padding: 40px; border-radius: 20px; text-align: center; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .google-btn { padding: 15px 25px; border: 1px solid #ddd; border-radius: 5px; background: white; font-weight: bold; cursor: pointer; display: flex; align-items: center; gap: 10px; }
    </style>
</head>
<body>

    <div id="auth-box" class="login-card">
        <h1>StarTalk</h1>
        <button class="google-btn" onclick="googleLogin()">
            <img src="https://cdn-icons-png.flaticon.com/512/2991/2991148.png" width="20">
            Google로 시작하기
        </button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, GoogleAuthProvider, signInWithPopup, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyC_PPRBwcwpy-3qmO3XgNGFuJy19QJkT6Y",
            authDomain: "star1-e9870.firebaseapp.com",
            projectId: "star1-e9870",
            appId: "1:849251951961:web:25275d26040f704e7b1848"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const provider = new GoogleAuthProvider();

        window.googleLogin = () => {
            signInWithPopup(auth, provider)
                .then((result) => alert(result.user.displayName + "님 환영합니다!"))
                .catch((error) => alert("에러: " + error.message));
        };

        onAuthStateChanged(auth, (user) => {
            if (user) {
                document.getElementById('auth-box').innerHTML = `
                    <h2>${user.displayName}님 로그인 성공!</h2>
                    <p>이제 채팅을 시작할 수 있습니다.</p>
                `;
            }
        });
    </script>
</body>
</html>
