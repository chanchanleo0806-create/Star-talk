<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>StarChat: Master Kakao-Edition</title>
    <style>
        :root { --kakao-yellow: #fee500; --kakao-brown: #3c1e1e; --bg: #ffffff; --gray: #f2f2f2; --text: #191919; }
        * { box-sizing: border-box; font-family: 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif; -webkit-tap-highlight-color: transparent; }
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; background: #000; color: var(--text); }
        #app { display: flex; flex-direction: column; height: 100vh; max-width: 500px; margin: 0 auto; background: var(--bg); position: relative; }

        /* 📱 상단 헤더 (카톡 스타일) */
        .header { padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; background: #fff; font-size: 1.4rem; font-weight: bold; }
        .header-icons { display: flex; gap: 18px; font-size: 1.2rem; cursor: pointer; }

        /* 📑 탭 뷰 */
        .view { display: none; height: calc(100% - 130px); overflow-y: auto; background: #fff; }
        .view.active { display: block; }

        /* 👤 친구 목록 스타일 */
        .list-item { display: flex; align-items: center; padding: 12px 20px; cursor: pointer; transition: 0.2s; }
        .list-item:active { background: #f5f5f5; }
        .profile-img { width: 50px; height: 50px; border-radius: 18px; object-fit: cover; background: #eee; margin-right: 15px; border: 1px solid rgba(0,0,0,0.05); }
        .profile-info { flex: 1; border-bottom: 1px solid #f9f9f9; padding-bottom: 10px; }
        .profile-name { font-weight: bold; font-size: 1rem; margin-bottom: 3px; }
        .profile-status { font-size: 0.8rem; color: #888; }

        /* 💬 채팅 목록 스타일 */
        .chat-preview { font-size: 0.85rem; color: #666; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 200px; }
        .chat-time { font-size: 0.7rem; color: #aaa; margin-left: auto; align-self: flex-start; margin-top: 5px; }

        /* ➕ 친구 추가 / 방 만들기 모달 */
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 7000; display: none; align-items: center; justify-content: center; padding: 20px; }
        .modal-content { background: #fff; width: 100%; max-width: 350px; border-radius: 15px; padding: 25px; }
        .modal-input { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; margin: 15px 0; outline: none; }
        .modal-btn { width: 100%; padding: 12px; background: var(--kakao-yellow); border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }

        /* 🎮 게임 버튼 */
        .game-tag { background: #f0f0f0; color: #555; font-size: 0.7rem; padding: 2px 6px; border-radius: 10px; margin-left: 5px; }

        /* 📱 하단 네비게이션 (카톡과 99% 동일) */
        .nav { height: 65px; display: flex; border-top: 1px solid #eee; background: #fff; align-items: center; }
        .nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer; transition: 0.2s; }
        .nav-item.active { color: #000; }
        .nav-icon { font-size: 1.5rem; margin-bottom: 2px; color: #bbb; }
        .active .nav-icon { color: #000; }
        .nav-text { font-size: 0.7rem; color: #bbb; }
        .active .nav-text { color: #000; font-weight: bold; }
    </style>
</head>
<body>

<div id="app">
    <div class="header">
        <span id="header-title">친구</span>
        <div class="header-icons">
            <span onclick="toggleModal('add-friend')">👤+</span>
            <span onclick="toggleModal('make-room')">💬+</span>
            <span onclick="lh()">⚙️</span>
        </div>
    </div>

    <div class="content" style="flex:1;">
        <div id="v-friends" class="view active">
            <div class="list-item" onclick="alert('프로필 보기')">
                <img src="https://via.placeholder.com/100" id="my-p" class="profile-img">
                <div class="profile-info">
                    <div class="profile-name">마스터 (나)</div>
                    <div class="profile-status">제국 건설 중... 🚀</div>
                </div>
            </div>
            <div style="padding:10px 20px; font-size:0.75rem; color:#999; background:#f9f9f9;">친구 128</div>
            <div id="friend-list">
                <div class="list-item">
                    <img src="https://via.placeholder.com/100?text=U" class="profile-img">
                    <div class="profile-info"><div class="profile-name">우노 고수 A <span class="game-tag">게임중</span></div><div class="profile-status">바둑 한 판 하실 분?</div></div>
                </div>
            </div>
        </div>

        <div id="v-chats" class="view">
            <div id="chat-list">
                <div class="list-item" onclick="alert('채팅방 입장')">
                    <img src="https://via.placeholder.com/100?text=G" class="profile-img">
                    <div class="profile-info">
                        <div class="profile-name">전국 우노 단톡방 <span style="color:#aaa; font-weight:normal;">12</span></div>
                        <div class="chat-preview">마스터: 1번 드로우 후 턴 넘기기 규칙 아시죠?</div>
                    </div>
                    <div class="chat-time">오후 4:21</div>
                </div>
                <div class="list-item" onclick="alert('오픈채팅 입장')">
                    <img src="https://via.placeholder.com/100?text=OPEN" class="profile-img" style="border: 2px solid #ffeb33;">
                    <div class="profile-info">
                        <div class="profile-name">📣 [오픈] 바둑/오목 24시간 매칭방</div>
                        <div class="chat-preview">매너 게임 부탁드립니다. 체크메이트 시 기권 필수!</div>
                    </div>
                    <div class="chat-time">어제</div>
                </div>
            </div>
        </div>

        <div id="v-games" class="view">
            <div style="padding:20px; display:grid; grid-template-columns:1fr 1fr; gap:15px;">
                <div style="background:#ff4444; color:#fff; padding:35px 10px; border-radius:20px; text-align:center; font-weight:bold;" onclick="alert('우노 실행')">🃏 무한 우노</div>
                <div style="background:#e3a857; color:#000; padding:35px 10px; border-radius:20px; text-align:center; font-weight:bold;" onclick="alert('바둑/오목 실행')">⚫ 바둑/오목</div>
                <div style="background:#333; color:#fff; padding:35px 10px; border-radius:20px; text-align:center; font-weight:bold;" onclick="alert('빙고 실행')">🔢 숫자 빙고</div>
                <div style="background:#7f8c8d; color:#fff; padding:35px 10px; border-radius:20px; text-align:center; font-weight:bold;" onclick="alert('체스 실행')">♟️ 체스</div>
            </div>
        </div>
    </div>

    <div class="nav">
        <div class="nav-item active" onclick="tab('friends', this, '친구')">
            <span class="nav-icon">👤</span><span class="nav-text">친구</span>
        </div>
        <div class="nav-item" onclick="tab('chats', this, '채팅')">
            <span class="nav-icon">💬</span><span class="nav-text">채팅</span>
        </div>
        <div class="nav-item" onclick="tab('games', this, '게임 제국')">
            <span class="nav-icon">🎮</span><span class="nav-text">게임</span>
        </div>
        <div class="nav-item" onclick="alert('VOD 서비스')">
            <span class="nav-icon">🎥</span><span class="nav-text">VOD</span>
        </div>
    </div>

    <div id="modal-add-friend" class="modal">
        <div class="modal-content">
            <h3>친구 추가</h3>
            <p style="font-size:0.8rem; color:#888;">상대방의 마스터 ID를 입력하세요.</p>
            <input type="text" id="friend-id" class="modal-input" placeholder="ID 입력">
            <button class="modal-btn" onclick="addFriend()">친구 추가하기</button>
            <button onclick="toggleModal('add-friend')" style="width:100%; background:none; border:none; margin-top:10px; color:#aaa;">취소</button>
        </div>
    </div>

    <div id="modal-make-room" class="modal">
        <div class="modal-content">
            <h3>새로운 채팅방</h3>
            <p style="font-size:0.8rem; color:#888;">채팅방 이름을 정해주세요.</p>
            <input type="text" id="room-name" class="modal-input" placeholder="방 이름 입력">
            <button class="modal-btn" onclick="makeRoom()">채팅방 만들기</button>
            <button onclick="toggleModal('make-room')" style="width:100%; background:none; border:none; margin-top:10px; color:#aaa;">취소</button>
        </div>
    </div>

</div>

<script>
    let l_h=0;
    function lh() { l_h++; if(l_h===3) alert("어드민 모드 진입 성공! (로그인 3번 남음)"); }

    // 탭 전환
    function tab(id, el, title) {
        document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        document.getElementById('v-' + id).classList.add('active');
        el.classList.add('active');
        document.getElementById('header-title').innerText = title;
    }

    // 모달 제어
    function toggleModal(id) {
        const m = document.getElementById('modal-' + id);
        m.style.display = (m.style.display === 'flex') ? 'none' : 'flex';
    }

    // [친구 추가] 기능
    function addFriend() {
        const id = document.getElementById('friend-id').value;
        if(!id) return;
        const list = document.getElementById('friend-list');
        const newItem = document.createElement('div');
        newItem.className = 'list-item';
        newItem.innerHTML = `
            <img src="https://via.placeholder.com/100?text=${id[0]}" class="profile-img">
            <div class="profile-info"><div class="profile-name">${id}</div><div class="profile-status">새로운 친구가 되었습니다!</div></div>
        `;
        list.prepend(newItem);
        alert(`${id}님을 친구 목록에 추가했습니다!`);
        toggleModal('add-friend');
    }

    // [방 만들기] 기능
    function makeRoom() {
        const name = document.getElementById('room-name').value;
        if(!name) return;
        const list = document.getElementById('chat-list');
        const newItem = document.createElement('div');
        newItem.className = 'list-item';
        newItem.innerHTML = `
            <img src="https://via.placeholder.com/100?text=NEW" class="profile-img">
            <div class="profile-info">
                <div class="profile-name">${name}</div>
                <div class="chat-preview">새로운 채팅방이 생성되었습니다.</div>
            </div>
            <div class="chat-time">방금</div>
        `;
        list.prepend(newItem);
        alert(`'${name}' 방이 성공적으로 생성되었습니다!`);
        toggleModal('make-room');
    }
</script>
</body>
</html>
